<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaeLauncher | Official Site</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d2ff;
            --success: #00ff88;
            --bg: #090a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        /* Карточка */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2.5em; margin: 10px 0; letter-spacing: -1px; }
        .version { 
            color: var(--primary); font-weight: bold; font-size: 0.9em; 
            margin-bottom: 30px; display: block; opacity: 0.8;
        }

        /* Кнопки */
        .btn-list { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; border-radius: 12px; text-decoration: none;
            color: white; font-weight: 600; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); transition: 0.3s;
        }

        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* Рекомендованная кнопка */
        .btn.recommended {
            background: white; color: black; border: none;
        }
        .btn.recommended:hover { background: #eee; box-shadow: 0 0 20px rgba(0,210,255,0.4); }

        .tag {
            font-size: 0.65em; background: #000; color: #fff;
            padding: 2px 6px; border-radius: 4px; margin-left: 8px;
        }

        /* Скрытые элементы */
        #step-2, #linux-tip { display: none; }

        .done-icon { font-size: 4em; color: var(--success); margin-bottom: 20px; }
        
        code {
            background: #000; color: var(--primary);
            padding: 5px 10px; border-radius: 6px; display: block;
            margin-top: 10px; font-family: monospace;
        }

        .back-btn {
            margin-top: 20px; background: none; border: 1px solid #333;
            color: #777; padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="step-1">
            <i class="fas fa-rocket" style="font-size: 3em; color: var(--primary);"></i>
            <h1>KaeLauncher</h1>
            <span class="version">v12.5 Stable</span>

            <div class="btn-list">
                <a href="https://github.com/imablackmemw/kl1/releases/download/v12.5/KaeLauncher_Install_v12.5.exe" 
                   id="win-btn" class="btn" onclick="goToSuccess('win')">
                    <i class="fab fa-windows"></i>
                    <span>Windows <small id="win-rec" class="tag" style="display:none">REC</small></span>
                </a>

                <a href="https://github.com/imablackmemw/kl1/releases/download/Linux/setup.sh" 
                   id="linux-btn" class="btn" onclick="goToSuccess('linux')">
                    <i class="fab fa-linux"></i>
                    <span>Linux <small id="linux-rec" class="tag" style="display:none">REC</small></span>
                </a>
            </div>
            
            <p id="status" style="font-size: 0.8em; color: #555; margin-top: 20px;">Определяем вашу систему...</p>
        </div>

        <div id="step-2">
            <i class="fas fa-check-circle done-icon"></i>
            <h2 style="margin: 0; color: var(--success)">Загрузка!</h2>
            <p style="color: #888; font-size: 0.9em; margin-top: 10px;">Файл скачивается. Установите его и играйте.</p>
            
            <div id="linux-tip">
                <p style="font-size: 0.85em; color: #aaa;">В терминале:</p>
                <code>bash setup.sh</code>
            </div>

            <button class="back-btn" onclick="location.reload()">Назад</button>
        </div>
    </div>

    <script>
        const ua = navigator.userAgent.toLowerCase();
        const winBtn = document.getElementById('win-btn');
        const linuxBtn = document.getElementById('linux-btn');
        const winRec = document.getElementById('win-rec');
        const linuxRec = document.getElementById('linux-rec');
        const status = document.getElementById('status');

        // Чистая логика определения ОС
        if (ua.includes("win")) {
            winBtn.classList.add('recommended');
            winRec.style.display = 'inline';
            status.innerText = "Рекомендуется для Windows";
        } else if (ua.includes("linux")) {
            linuxBtn.classList.add('recommended');
            linuxRec.style.display = 'inline';
            status.innerText = "Рекомендуется для Linux";
        }

        // Переключение экранов
        function goToSuccess(os) {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            
            if (os === 'linux') {
                document.getElementById('linux-tip').style.display = 'block';
            }
        }
    </script>
</body>
</html>
