<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaeLauncher | Официальный сайт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --success: #00ff88; }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 40px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); z-index: 10;
        }
        h1 { font-size: 2.5em; margin: 0; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version { font-size: 0.9em; color: var(--primary); font-weight: bold; margin-bottom: 25px; display: block; }
        
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; background: rgba(255,255,255,0.05); color: white;
            text-decoration: none; border-radius: 15px; font-weight: 600;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn.recommended {
            background: white; color: black; font-weight: 800; transform: scale(1.05);
            border: none; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }
        
        .btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .btn.recommended:hover { background: #eee; transform: scale(1.07); }

        .rec-tag { font-size: 0.7em; background: #000; color: #fff; padding: 2px 8px; border-radius: 5px; margin-left: 8px; }
        
        .info { margin-top: 25px; font-size: 0.8em; color: #666; }
        .done-icon { font-size: 5em; color: var(--success); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="step-1">
        <i class="fas fa-rocket" style="font-size: 3em; margin-bottom: 20px; color: var(--primary);"></i>
        <h1>KaeLauncher</h1>
        <span class="version">v12.5 Stable</span>
        
        <div class="btn-container">
            <!-- Кнопка Windows -->
            <a href="https://github.com/imablackmemw/Kaelauncher.github.io/releases/download/v12.5/KaeLauncher_Install_v12.5.exe" 
               id="win-btn" class="btn" onclick="showSuccess()">
                <i class="fab fa-windows"></i>
                <span>Windows <small id="win-rec" style="display:none;" class="rec-tag">Рекомендуем</small></span>
            </a>

            <!-- Кнопка Linux -->
            <a href="#" id="linux-btn" class="btn" onclick="alert('Версия для Linux скоро появится!'); return false;">
                <i class="fab fa-linux"></i>
                <span>Linux <small id="linux-rec" style="display:none;" class="rec-tag">Рекомендуем</small></span>
            </a>
        </div>

        <div class="info">
            <p id="os-detected">Выберите платформу</p>
        </div>
    </div>

    <div id="step-2" style="display: none;">
        <i class="fas fa-check-circle done-icon"></i>
        <h2 style="color: var(--success); margin: 0;">Загрузка началась!</h2>
        <p style="color: #888;">Установите скачанный файл и заходите в игру.</p>
        <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#555; padding:8px 15px; border-radius:10px; cursor:pointer; margin-top:20px;">Вернуться</button>
    </div>
</div>

<script>
    const platform = window.navigator.userAgent.toLowerCase();
    const winBtn = document.getElementById('win-btn');
    const linuxBtn = document.getElementById('linux-btn');
    const winRec = document.getElementById('win-rec');
    const linuxRec = document.getElementById('linux-rec');

    if (platform.indexOf("win") !== -1) {
        winBtn.classList.add('recommended');
        winRec.style.display = 'inline';
    } else if (platform.indexOf("linux") !== -1) {
        linuxBtn.classList.add('recommended');
        linuxRec.style.display = 'inline';
    }

    function showSuccess() {
        setTimeout(() => {
            document.getElementById('step-1').style.display = "none";
            document.getElementById('step-2').style.display = "block";
        }, 300);
    }
</script>

</body> 
</html>
